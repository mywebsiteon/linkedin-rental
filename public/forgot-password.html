<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - LinkedRent</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #0a66c2; --primary-dark: #004182; --text-dark: #191919; --text-medium: #666666; --text-light: #999999; --border: #e0e0e0; --success: #057642; --danger: #cc1016; }
    body { font-family: 'DM Sans', -apple-system, system-ui, sans-serif; background: #f8fafc; color: var(--text-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 420px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    p { color: var(--text-medium); margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; }
    .form-input:focus { outline: none; border-color: var(--primary); }
    .btn-primary { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: var(--primary-dark); }
    .alert { padding: 14px; border-radius: 8px; margin-bottom: 20px; display: none; font-size: 14px; }
    .alert.show { display: block; }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <p>Enter your email to receive a password reset link</p>
    <div id="alert" class="alert"></div>
    <form id="forgotForm">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn-primary">Send Reset Link</button>
    </form>
    <a href="login.html" class="back-link">Back to login</a>
  </div>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const alert = document.getElementById('alert');
      try {
        const res = await fetch('/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.success) {
          alert.className = 'alert alert-success show';
          alert.textContent = data.message + (data.token ? ' (Token: ' + data.token + ')' : '');
        } else {
          alert.className = 'alert alert-error show';
          alert.textContent = data.message;
        }
      } catch (err) {
        alert.className = 'alert alert-error show';
        alert.textContent = 'An error occurred. Please try again.';
      }
    });
  </script>
</body>
</html>
